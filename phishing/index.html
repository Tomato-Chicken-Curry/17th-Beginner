<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>피싱 URL 탐지기</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; text-align: center; padding-top: 50px; background-color: #f4f4f9; }
        .container { background: white; display: inline-block; padding: 30px; border-radius: 10px; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { width: 300px; padding: 12px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 12px 25px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; }
        #result { margin-top: 25px; font-size: 1.2em; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI 피싱 URL 탐지기</h1>
        <p>분석하고 싶은 URL 주소를 입력해 보세요.</p>
        <input type="text" id="urlInput" placeholder="https://example.com">
        <button onclick="checkUrl()">분석 시작</button>
        <div id="result"></div>
    </div>

    <script>
        function checkUrl() {
            const url = document.getElementById('urlInput').value.toLowerCase();
            const resultDiv = document.getElementById('result');
            
            // 프론트엔드에서 간단하게 구현하는 로직 (과제용)
            if (url.includes('secure') || url.includes('login') || url.includes('update') || url.length > 25) {
                resultDiv.innerHTML = "<span style='color:red;'>⚠️ 위험: 피싱 사이트일 확률이 매우 높습니다!</span>";
            } else if (url === "") {
                resultDiv.innerHTML = "URL을 입력해 주세요.";
            } else {
                resultDiv.innerHTML = "<span style='color:green;'>✅ 안전: 정상적인 사이트로 보입니다.</span>";
            }
        }
    </script>
</body>
</html>
